[build]
  command = "pnpm run build"
  # Static export output dir — REQUIRED for Netlify Forms capture (plain HTML forms).
  publish = "out"

[build.environment]
  NEXT_DISABLE_TURBOPACK = "1"
  NODE_VERSION = "18"

# NOTE: @netlify/plugin-nextjs INTENTIONALLY REMOVED (2026-06-28) — its runtime intercepts
# form POSTs and prevents Netlify from registering the static forms (forms=0 despite
# public/__forms.html being served). Static export emits plain HTML the form backend handles.

[[notifications]]
  form_name = "quote"
  [notifications.webhook]
    url = "https://josh.jam-bot.com/social-api/api/leads/webhook/netlify?tenant=josh&site=equipmentrentalinsurance.com"
    events = ["submission_created"]

[[notifications]]
  form_name = "contact"
  [notifications.webhook]
    url = "https://josh.jam-bot.com/social-api/api/leads/webhook/netlify?tenant=josh&site=equipmentrentalinsurance.com"
    events = ["submission_created"]

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
